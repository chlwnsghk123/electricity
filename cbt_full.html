<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전기기사 CBT · 2022년 2회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e12;
    --panel: #15171e;
    --panel-hi: #1c1f29;
    --line: #252836;
    --ink: #e8eaf0;
    --ink-dim: #8892a6;
    --accent: #ffcb3a;
    --accent-dim: #b8912a;
    --correct: #4ade80;
    --wrong: #f87171;
    --warn: #fbbf24;
    --bookmark: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans KR', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Header */
  header {
    border-bottom: 1px solid var(--line);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-bolt {
    width: 26px; height: 26px;
    background: var(--accent);
    clip-path: polygon(55% 0%, 0% 60%, 45% 60%, 25% 100%, 100% 40%, 50% 40%, 70% 0%);
  }
  .logo-text { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
  .logo-sub {
    color: var(--ink-dim); font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .timer {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500; font-size: 17px;
    color: var(--accent); letter-spacing: 0.02em;
  }
  .timer.warn { color: var(--warn); }
  .timer.danger { color: var(--wrong); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.5; } }
  .subject-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    background: var(--panel-hi);
    border: 1px solid var(--line);
    color: var(--ink-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 20px 140px;
  }

  /* Welcome */
  .welcome { text-align: center; padding: 20px 0 40px; }
  .welcome h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 10px;
    line-height: 1.12;
  }
  .welcome h1 .accent { color: var(--accent); }
  .welcome .tagline {
    color: var(--ink-dim); font-size: 15px; margin-bottom: 36px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 32px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 16px 14px;
    text-align: left;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .stat-value.accent { color: var(--accent); }

  .mode-select { margin: 30px 0; }
  .mode-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .mode-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    max-width: 700px;
    margin: 0 auto;
  }
  .mode-card {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 18px 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .mode-card:hover {
    border-color: var(--accent);
    background: var(--panel-hi);
  }
  .mode-card.selected {
    border-color: var(--accent);
    background: rgba(255, 203, 58, 0.08);
  }
  .mode-title {
    font-weight: 600; font-size: 14px;
    margin-bottom: 4px;
  }
  .mode-desc {
    font-size: 12px; color: var(--ink-dim);
    line-height: 1.4;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 26px;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-weight: 600; font-size: 14px;
    border: none; cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.01em;
  }
  .btn-primary { background: var(--accent); color: #0d0e12; }
  .btn-primary:hover { background: #ffd95a; }
  .btn-ghost {
    background: transparent; color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Question */
  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    flex-wrap: wrap;
    gap: 10px;
  }
  .q-num-group {
    display: flex; align-items: center; gap: 10px;
  }
  .q-num-badge {
    background: var(--accent);
    color: #0d0e12;
    font-weight: 700;
    padding: 3px 10px;
    font-size: 11px;
  }
  .subject-label { color: var(--ink-dim); }
  .q-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    padding: 4px 10px;
    cursor: pointer;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.active {
    background: var(--bookmark);
    border-color: var(--bookmark);
    color: #0d0e12;
  }

  .question-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.7;
    margin-bottom: 22px;
    letter-spacing: -0.005em;
  }
  .has-image-note {
    display: block;
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--panel-hi);
    border-left: 2px solid var(--warn);
    font-size: 13px;
    color: var(--warn);
    font-style: italic;
  }
  .has-formula-tag {
    display: inline-block;
    padding: 2px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--warn);
    border: 1px solid var(--warn);
    margin-left: 8px;
    letter-spacing: 0.05em;
  }

  .choices { display: flex; flex-direction: column; gap: 9px; }
  .choice {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.12s ease;
    user-select: none;
  }
  .choice:hover { border-color: var(--accent-dim); background: var(--panel-hi); }
  .choice.selected {
    border-color: var(--accent);
    background: rgba(255, 203, 58, 0.06);
  }
  .choice-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; color: var(--ink-dim);
    min-width: 20px; font-size: 14px;
  }
  .choice.selected .choice-num { color: var(--accent); }
  .choice-text {
    flex: 1; font-size: 14px; line-height: 1.55;
    word-break: keep-all;
  }
  .choice.correct {
    border-color: var(--correct);
    background: rgba(74, 222, 128, 0.1);
  }
  .choice.correct .choice-num { color: var(--correct); }
  .choice.incorrect-pick {
    border-color: var(--wrong);
    background: rgba(248, 113, 113, 0.1);
  }
  .choice.incorrect-pick .choice-num { color: var(--wrong); }

  /* Nav footer */
  .nav-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .nav-footer .center {
    flex: 1; max-width: 520px; margin: 0 auto;
  }
  .progress-bar {
    height: 3px; background: var(--line); overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s ease;
  }
  .progress-text {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    margin-top: 6px;
    letter-spacing: 0.08em;
  }
  .jump-btn {
    background: var(--panel-hi);
    border: 1px solid var(--line);
    color: var(--ink-dim);
    padding: 8px 12px;
    cursor: pointer;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .jump-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* Jump modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--line);
    max-width: 700px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.15em;
    color: var(--ink-dim); text-transform: uppercase;
    margin-bottom: 16px;
  }
  .qgrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
    gap: 6px;
  }
  .qcell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    background: var(--panel-hi);
    border: 1px solid var(--line);
    color: var(--ink-dim);
    cursor: pointer;
    transition: all 0.1s;
  }
  .qcell:hover { border-color: var(--accent); color: var(--accent); }
  .qcell.answered { background: rgba(255,203,58,0.15); color: var(--accent); border-color: var(--accent-dim); }
  .qcell.current { background: var(--accent); color: #0d0e12; border-color: var(--accent); }
  .qcell.bookmarked::after {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    background: var(--bookmark);
    border-radius: 50%;
    margin-top: -18px;
    margin-left: 18px;
  }
  .qcell { position: relative; }
  .subject-group { margin-bottom: 16px; }
  .subject-group-label {
    font-size: 11px;
    color: var(--ink-dim);
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
  }

  /* Result */
  .result { text-align: center; padding: 20px 0; }
  .score-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(50px, 12vw, 90px);
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 1;
    margin: 16px 0;
  }
  .score-display.pass { color: var(--correct); }
  .score-display.fail { color: var(--wrong); }
  .score-total { color: var(--ink-dim); font-size: 0.4em; }
  .verdict {
    font-size: 18px; font-weight: 600;
    margin-bottom: 20px;
  }
  .subject-scores {
    max-width: 600px;
    margin: 28px auto;
  }
  .subj-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .subj-row.pass { border-left-color: var(--correct); }
  .subj-row.fail { border-left-color: var(--wrong); }
  .subj-row .sname { color: var(--ink); font-family: 'IBM Plex Sans KR'; font-weight: 500; }
  .subj-row .sscore { font-weight: 700; }
  .subj-row.pass .sscore { color: var(--correct); }
  .subj-row.fail .sscore { color: var(--wrong); }

  .action-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 24px 0;
  }

  /* Explanation area (review) */
  .explanation {
    margin-top: 18px;
    padding: 16px 18px;
    background: var(--panel-hi);
    border-left: 3px solid var(--accent);
  }
  .explanation-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .explanation-text {
    font-size: 13px; line-height: 1.65;
    color: var(--ink-dim);
  }
  .ask-hint {
    margin-top: 10px;
    font-size: 12px;
    color: var(--warn);
    font-style: italic;
  }

  @media (max-width: 640px) {
    .btn { padding: 12px 20px; font-size: 13px; }
    main { padding: 18px 14px 140px; }
    .q-meta { font-size: 10px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-bolt"></div>
    <div>
      <div class="logo-text">전기기사 CBT</div>
      <div class="logo-sub">2022 / 2회</div>
    </div>
  </div>
  <div class="header-right">
    <div class="subject-pill" id="subjectPill" style="display:none;">--</div>
    <div class="timer" id="timer">--:--</div>
  </div>
</header>

<main id="app"></main>

<div class="nav-footer" id="navFooter" style="display:none;">
  <button class="btn btn-ghost" id="prevBtn" onclick="prevQ()">← 이전</button>
  <div class="center">
    <button class="jump-btn" onclick="openJumpModal()" style="width:100%;">문제 목록 / 건너뛰기</button>
    <div class="progress-bar" style="margin-top: 8px;"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 100</div>
  </div>
  <button class="btn btn-primary" id="nextBtn" onclick="nextQ()">다음 →</button>
</div>

<div class="modal-backdrop" id="jumpModal" onclick="closeJumpModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">문제 이동 · 🟡 답함 · 🔵 북마크</div>
    <div id="qgridContainer"></div>
    <div style="margin-top: 20px; text-align: right;">
      <button class="btn btn-ghost" onclick="closeJumpModal()">닫기</button>
      <button class="btn btn-primary" onclick="closeJumpModal(); confirmSubmit();">답안 제출</button>
    </div>
  </div>
</div>

<script>
let QUESTIONS = [];
let SUBJECTS = {};
let EXAM_META = {};

let state = {
  screen: 'welcome',
  mode: null,
  current: 0,
  filteredIndices: [],
  answers: {},
  bookmarks: new Set(),
  startTime: null,
  duration: 150 * 60,
  timerInterval: null,
  submitted: false
};

async function loadData() {
  const res = await fetch('exam_2022_r2.json');
  const data = await res.json();
  EXAM_META = data.meta;
  QUESTIONS = data.questions;
  data.meta.subjects.forEach(s => {
    SUBJECTS[s.no] = s.name;
  });
}

function render() {
  const app = document.getElementById('app');
  const footer = document.getElementById('navFooter');
  const pill = document.getElementById('subjectPill');

  if (state.screen === 'welcome') {
    footer.style.display = 'none';
    pill.style.display = 'none';
    app.innerHTML = `
      <div class="welcome">
        <h1>전기기사 <span class="accent">100문제</span></h1>
        <p class="tagline">2022년 2회 · 2022.04.24 · 실전 CBT</p>

        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">문제 수</div>
            <div class="stat-value accent">100</div>
          </div>
          <div class="stat">
            <div class="stat-label">제한 시간</div>
            <div class="stat-value">150:00</div>
          </div>
          <div class="stat">
            <div class="stat-label">합격 기준</div>
            <div class="stat-value">60+</div>
          </div>
          <div class="stat">
            <div class="stat-label">과락 기준</div>
            <div class="stat-value">40 미만</div>
          </div>
        </div>

        <div class="mode-select">
          <div class="mode-label">모드 선택</div>
          <div class="mode-options">
            <div class="mode-card" onclick="setMode('full')" id="mode-full">
              <div class="mode-title">⚡ 실전 모드</div>
              <div class="mode-desc">전 100문제 · 150분 타이머 · 제출 후 채점</div>
            </div>
            <div class="mode-card" onclick="setMode('study')" id="mode-study">
              <div class="mode-title">📚 학습 모드</div>
              <div class="mode-desc">타이머 없음 · 즉시 정답 확인</div>
            </div>
            <div class="mode-card" onclick="setMode('subject')" id="mode-subject">
              <div class="mode-title">🎯 과목별 풀이</div>
              <div class="mode-desc">원하는 과목 하나씩 · 20문제씩</div>
            </div>
          </div>
        </div>

        <div id="subjectPicker" style="display:none; margin-bottom: 24px;">
          <div class="mode-label">과목 선택</div>
          <div class="mode-options">
            ${Object.entries(SUBJECTS).map(([n, name]) => `
              <div class="mode-card" onclick="setSubject(${n})" id="subj-${n}">
                <div class="mode-title">${name}</div>
                <div class="mode-desc">${(n-1)*20+1}번 ~ ${n*20}번</div>
              </div>
            `).join('')}
          </div>
        </div>

        <button class="btn btn-primary" id="startBtn" onclick="startExam()" disabled>시험 시작 →</button>
        <div style="color: var(--ink-dim); font-size: 11px; margin-top: 24px; font-family: 'JetBrains Mono', monospace;">
          데이터: kinz.kr · 정답: quz.co.kr · 100문제 full set
        </div>
      </div>
    `;
    return;
  }

  if (state.screen === 'exam' || state.screen === 'review') {
    footer.style.display = 'flex';
    const qIdx = state.filteredIndices[state.current];
    const q = QUESTIONS[qIdx];
    const selected = state.answers[qIdx];
    const isReview = state.screen === 'review';
    const isCorrect = selected === q.a;
    const isBookmarked = state.bookmarks.has(qIdx);

    pill.style.display = 'inline-block';
    pill.textContent = SUBJECTS[q.subject];

    app.innerHTML = `
      <div class="q-meta">
        <div class="q-num-group">
          <span class="q-num-badge">Q ${String(q.no).padStart(3, '0')}</span>
          <span class="subject-label">${SUBJECTS[q.subject]}</span>
          ${isReview && selected ? (isCorrect ? '<span style="color:var(--correct)">✓ 정답</span>' : '<span style="color:var(--wrong)">✗ 오답</span>') : ''}
          ${isReview && !selected ? '<span style="color:var(--warn)">미응답</span>' : ''}
        </div>
        <div class="q-actions">
          <button class="icon-btn ${isBookmarked ? 'active' : ''}" onclick="toggleBookmark()">★ ${isBookmarked ? '저장됨' : '저장'}</button>
        </div>
      </div>
      <div class="question-text">
        ${q.q}
        ${q.has_formula ? '<span class="has-formula-tag">수식포함</span>' : ''}
        ${q.has_image ? `<span class="has-image-note">📷 ${q.image_note || '그림 포함 문제입니다. 원본 기출 참조.'}</span>` : ''}
      </div>
      <div class="choices">
        ${q.c.map((choice, i) => {
          const n = i + 1;
          let cls = '';
          if (isReview) {
            if (n === q.a) cls = 'correct';
            else if (n === selected && !isCorrect) cls = 'incorrect-pick';
          } else {
            if (selected === n) cls = 'selected';
          }
          const clickable = isReview ? '' : `onclick="selectChoice(${n})"`;
          return `
            <div class="choice ${cls}" ${clickable}>
              <div class="choice-num">${['①','②','③','④'][i]}</div>
              <div class="choice-text">${choice}</div>
            </div>
          `;
        }).join('')}
      </div>
      ${isReview ? `
        <div class="explanation">
          <div class="explanation-label">이 문제 해설이 궁금하다면?</div>
          <div class="explanation-text">
            해설은 앱 밖에서 Claude한테 물어봐. "${q.no}번 문제 설명해줘" 또는 "${q.q.substring(0, 30)}... 이 문제 풀이 좀" 이렇게.
          </div>
          <div class="ask-hint">💡 틀린 문제를 북마크 저장하고, 한꺼번에 Claude한테 물어보는 게 효율적이야.</div>
        </div>
      ` : ''}
    `;
    updateNav();
    return;
  }

  if (state.screen === 'result') {
    footer.style.display = 'none';
    pill.style.display = 'none';
    clearInterval(state.timerInterval);

    // 과목별 점수 계산
    const subjScores = {};
    for (let sn = 1; sn <= 5; sn++) {
      const subjQs = QUESTIONS.filter(q => q.subject === sn);
      const correct = subjQs.filter(q => {
        const idx = QUESTIONS.indexOf(q);
        return state.answers[idx] === q.a;
      }).length;
      const score = Math.round((correct / subjQs.length) * 100);
      subjScores[sn] = { correct, total: subjQs.length, score };
    }

    const totalCorrect = Object.values(subjScores).reduce((s, v) => s + v.correct, 0);
    const totalScore = Math.round((totalCorrect / 100) * 100);
    const hasFailingSubject = Object.values(subjScores).some(s => s.score < 40);
    const passed = totalScore >= 60 && !hasFailingSubject;
    const attempted = Object.keys(state.answers).length;

    app.innerHTML = `
      <div class="result">
        <div class="q-meta" style="justify-content:center; margin-bottom: 10px;">
          <span style="font-family: 'JetBrains Mono', monospace; letter-spacing: 0.15em;">EXAM RESULT</span>
        </div>
        <div class="score-display ${passed ? 'pass' : 'fail'}">
          ${totalScore}<span class="score-total">/100</span>
        </div>
        <div class="verdict">
          ${passed ? '🔥 합격선 통과' : hasFailingSubject ? '⚠️ 과락 발생' : '⚡ 평균 60점 미달'}
        </div>

        <div class="subject-scores">
          ${Object.entries(subjScores).map(([sn, v]) => `
            <div class="subj-row ${v.score >= 40 ? 'pass' : 'fail'}">
              <span class="sname">${SUBJECTS[sn]}</span>
              <span class="sscore">${v.correct}/${v.total} · ${v.score}점</span>
            </div>
          `).join('')}
        </div>

        <div style="color:var(--ink-dim); font-size: 13px; margin: 16px 0;">
          응답 ${attempted}/100 · 정답 ${totalCorrect}개 · 북마크 ${state.bookmarks.size}개
        </div>

        <div class="action-row">
          <button class="btn btn-primary" onclick="reviewAll()">전체 리뷰 →</button>
          <button class="btn btn-ghost" onclick="reviewWrong()">오답만 보기</button>
          <button class="btn btn-ghost" onclick="reviewBookmarked()">북마크 보기</button>
          <button class="btn btn-ghost" onclick="reset()">처음으로</button>
        </div>
      </div>
    `;
    return;
  }
}

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`mode-${mode}`).classList.add('selected');
  const subjPicker = document.getElementById('subjectPicker');
  const startBtn = document.getElementById('startBtn');
  if (mode === 'subject') {
    subjPicker.style.display = 'block';
    startBtn.disabled = true;
    state.selectedSubject = null;
  } else {
    subjPicker.style.display = 'none';
    startBtn.disabled = false;
  }
}

function setSubject(sn) {
  state.selectedSubject = sn;
  document.querySelectorAll('#subjectPicker .mode-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`subj-${sn}`).classList.add('selected');
  document.getElementById('startBtn').disabled = false;
}

function startExam() {
  if (!state.mode) return;
  if (state.mode === 'full' || state.mode === 'study') {
    state.filteredIndices = QUESTIONS.map((_, i) => i);
  } else if (state.mode === 'subject' && state.selectedSubject) {
    state.filteredIndices = QUESTIONS
      .map((q, i) => q.subject === state.selectedSubject ? i : -1)
      .filter(i => i >= 0);
  }
  state.current = 0;
  state.answers = {};
  state.bookmarks = new Set();
  state.submitted = false;
  state.screen = 'exam';

  if (state.mode === 'full') {
    state.startTime = Date.now();
    startTimer();
  } else {
    document.getElementById('timer').textContent = '∞';
    document.getElementById('timer').className = 'timer';
  }
  render();
}

function startTimer() {
  updateTimer();
  state.timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const remaining = state.duration - elapsed;
  if (remaining <= 0) {
    clearInterval(state.timerInterval);
    document.getElementById('timer').textContent = '00:00';
    finishExam();
    return;
  }
  const h = Math.floor(remaining / 3600);
  const m = Math.floor((remaining % 3600) / 60);
  const s = remaining % 60;
  const el = document.getElementById('timer');
  el.textContent = h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'timer';
  if (remaining < 600) el.className = 'timer warn';
  if (remaining < 60) el.className = 'timer danger';
}

function selectChoice(n) {
  const qIdx = state.filteredIndices[state.current];
  state.answers[qIdx] = n;
  render();
  // 학습 모드면 자동으로 정답 즉시 보여주기 위한 처리
  if (state.mode === 'study') {
    // 학습 모드는 다음으로 안 넘기고, 답 체크 상태만 업데이트
  }
}

function toggleBookmark() {
  const qIdx = state.filteredIndices[state.current];
  if (state.bookmarks.has(qIdx)) state.bookmarks.delete(qIdx);
  else state.bookmarks.add(qIdx);
  render();
}

function updateNav() {
  const total = state.filteredIndices.length;
  const pos = state.current + 1;
  document.getElementById('progressText').textContent = `${pos} / ${total}`;
  document.getElementById('progressFill').style.width = `${(pos/total)*100}%`;
  document.getElementById('prevBtn').disabled = state.current <= 0;

  const nextBtn = document.getElementById('nextBtn');
  if (state.screen === 'exam') {
    nextBtn.textContent = state.current >= total - 1 ? '제출 →' : '다음 →';
  } else {
    nextBtn.textContent = state.current >= total - 1 ? '결과로 ←' : '다음 →';
  }
}

function nextQ() {
  const total = state.filteredIndices.length;
  if (state.current >= total - 1) {
    if (state.screen === 'exam') {
      confirmSubmit();
    } else {
      state.screen = 'result';
      render();
    }
    return;
  }
  state.current++;
  render();
}

function prevQ() {
  if (state.current <= 0) return;
  state.current--;
  render();
}

function confirmSubmit() {
  const attempted = Object.keys(state.answers).length;
  const total = state.filteredIndices.length;
  const unanswered = total - state.filteredIndices.filter(i => state.answers[i]).length;
  const msg = unanswered > 0
    ? `미응답 ${unanswered}개. 정말 제출하시겠습니까?`
    : '답안을 제출하시겠습니까?';
  if (confirm(msg)) finishExam();
}

function finishExam() {
  state.submitted = true;
  state.screen = 'result';
  clearInterval(state.timerInterval);
  render();
}

function reviewAll() {
  state.screen = 'review';
  state.filteredIndices = QUESTIONS.map((_, i) => i);
  state.current = 0;
  render();
}

function reviewWrong() {
  const wrongs = QUESTIONS.map((q, i) => state.answers[i] !== q.a ? i : -1).filter(x => x >= 0);
  if (wrongs.length === 0) {
    alert('오답이 없습니다! 🎉');
    return;
  }
  state.screen = 'review';
  state.filteredIndices = wrongs;
  state.current = 0;
  render();
}

function reviewBookmarked() {
  if (state.bookmarks.size === 0) {
    alert('북마크한 문제가 없습니다.');
    return;
  }
  state.screen = 'review';
  state.filteredIndices = [...state.bookmarks].sort((a,b) => a-b);
  state.current = 0;
  render();
}

function openJumpModal() {
  const modal = document.getElementById('jumpModal');
  const container = document.getElementById('qgridContainer');
  const subjectGroups = {};
  state.filteredIndices.forEach((qIdx, pos) => {
    const q = QUESTIONS[qIdx];
    if (!subjectGroups[q.subject]) subjectGroups[q.subject] = [];
    subjectGroups[q.subject].push({ qIdx, pos, q });
  });
  container.innerHTML = Object.entries(subjectGroups).map(([sn, items]) => `
    <div class="subject-group">
      <div class="subject-group-label">${SUBJECTS[sn]}</div>
      <div class="qgrid">
        ${items.map(({qIdx, pos, q}) => {
          const answered = state.answers[qIdx] !== undefined;
          const current = pos === state.current;
          const bookmarked = state.bookmarks.has(qIdx);
          let cls = 'qcell';
          if (answered) cls += ' answered';
          if (current) cls += ' current';
          if (bookmarked) cls += ' bookmarked';
          return `<div class="${cls}" onclick="jumpTo(${pos})">${q.no}</div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
  modal.classList.add('open');
}

function closeJumpModal(e) {
  if (e && e.target !== e.currentTarget && !e.target.closest('.btn')) return;
  document.getElementById('jumpModal').classList.remove('open');
}

function jumpTo(pos) {
  state.current = pos;
  closeJumpModal();
  render();
}

function reset() {
  state = {
    screen: 'welcome',
    mode: null,
    current: 0,
    filteredIndices: [],
    answers: {},
    bookmarks: new Set(),
    startTime: null,
    duration: 150 * 60,
    timerInterval: null,
    submitted: false
  };
  document.getElementById('timer').textContent = '--:--';
  document.getElementById('timer').className = 'timer';
  render();
}

loadData().then(() => render()).catch(err => {
  document.getElementById('app').innerHTML = `
    <div style="text-align:center; padding: 40px; color: var(--wrong);">
      <h2>데이터 로드 실패</h2>
      <p style="color:var(--ink-dim); margin-top: 10px;">exam_2022_r2.json 파일이 같은 폴더에 있는지 확인해주세요.</p>
      <pre style="color:var(--ink-dim); margin-top:20px; font-size:11px;">${err.message}</pre>
    </div>
  `;
});
</script>
</body>
</html>
